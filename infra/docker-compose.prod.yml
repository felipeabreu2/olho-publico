# ──────────────────────────────────────────────────────────────────────
# Olho Público — Stack Swarm (Portainer) com Traefik externo
#
# Padrão: rede OptionNet externa + volumes externos + Traefik com
# certresolver letsencryptresolver no entrypoint websecure.
#
# Antes de subir, criar volumes externos na VPS (uma vez só):
#
#   docker volume create olho_publico_postgres
#
# Domínios sugeridos:
#   olho.optiongrowth.com.br        → site público (web)
#   pgadmin-olho.optiongrowth.com.br → opcional, futuro
# ──────────────────────────────────────────────────────────────────────

version: "3.7"

services:
## --------------------------- POSTGRES --------------------------- ##
  postgres:
    image: postgis/postgis:16-3.4
    volumes:
      - olho_publico_postgres:/var/lib/postgresql/data
    networks:
      - OptionNet
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: olho_publico
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

## --------------------------- WEB (Next.js) --------------------------- ##
  web:
    image: ghcr.io/${GITHUB_REPO}/web:latest
    networks:
      - OptionNet
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/olho_publico
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      NODE_ENV: production
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.25"
      labels:
        - traefik.enable=true
        - traefik.http.routers.olho_publico_web.rule=Host(`${WEB_HOST}`)
        - traefik.http.routers.olho_publico_web.entrypoints=websecure
        - traefik.http.routers.olho_publico_web.priority=1
        - traefik.http.routers.olho_publico_web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.olho_publico_web.service=olho_publico_web
        - traefik.http.services.olho_publico_web.loadbalancer.server.port=3000
        - traefik.http.services.olho_publico_web.loadbalancer.passHostHeader=true

## --------------------------- ETL (Python) --------------------------- ##
  etl:
    image: ghcr.io/${GITHUB_REPO}/etl:latest
    networks:
      - OptionNet
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/olho_publico
      TRANSPARENCIA_API_KEY: ${TRANSPARENCIA_API_KEY}
      TRANSPARENCIA_RATE_PER_MINUTE: ${TRANSPARENCIA_RATE_PER_MINUTE:-400}
      IBGE_SYNC_LIST: ${IBGE_SYNC_LIST:-3550308}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_RAW: ${R2_BUCKET_RAW}
      R2_BUCKET_BRONZE: ${R2_BUCKET_BRONZE}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5

## --------------------------- BACKUP --------------------------- ##
  postgres-backup:
    image: postgres:16-alpine
    networks:
      - OptionNet
    environment:
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGDATABASE: olho_publico
      R2_BUCKET: ${R2_BUCKET_BACKUPS}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache aws-cli > /dev/null 2>&1
        while true; do
          DATE=$$(date -u +%Y%m%d-%H%M%S)
          DUMP_FILE="/tmp/olho_publico_$${DATE}.sql.gz"
          if [ -n "$$R2_BUCKET" ] && [ -n "$$R2_ACCOUNT_ID" ]; then
            pg_dump --no-owner --no-acl | gzip > "$$DUMP_FILE" && \
            aws s3 cp "$$DUMP_FILE" "s3://$${R2_BUCKET}/postgres/$${DATE}.sql.gz" \
              --endpoint-url "https://$${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" && \
            rm "$$DUMP_FILE" && \
            echo "[backup] $${DATE} enviado"
          else
            echo "[backup] R2 não configurado — pulando"
          fi
          sleep 86400
        done
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

## --------------------------- VOLUMES --------------------------- ##
volumes:
  olho_publico_postgres:
    external: true
    name: olho_publico_postgres

## --------------------------- NETWORK --------------------------- ##
networks:
  OptionNet:
    external: true
    name: OptionNet
